<div class="config-page">

  <h2 class="page-title">Días Festivos</h2>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-top">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#163572" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="stat-num">{{ feriadosFiltrados.length }}</span>
      </div>
      <span class="stat-label">Feriados {{ anio }}</span>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#163572" stroke-width="1.5">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        <span class="stat-num">{{ contarTipo('NACIONAL') }}</span>
      </div>
      <span class="stat-label">Nacionales</span>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#163572" stroke-width="1.5">
          <path d="M12 2L12 6"/>
          <path d="M12 6 C8 6 5 9 5 13 C5 17 8 20 12 20 C16 20 19 17 19 13 C19 9 16 6 12 6Z"/>
          <line x1="9" y1="2" x2="15" y2="2"/>
        </svg>
        <span class="stat-num">{{ contarTipo('RELIGIOSO') }}</span>
      </div>
      <span class="stat-label">Religiosos</span>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#163572" stroke-width="1.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="stat-num">{{ contarTipo('LOCAL') }}</span>
      </div>
      <span class="stat-label">Locales</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="nav-btn" (click)="cambiarMes(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="btn-today" (click)="irHoy()">Hoy</button>
      <button class="nav-btn" (click)="cambiarMes(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <span class="mes-label">{{ meses[mesActual] }} de {{ anio }}</span>
    </div>
    <button class="btn-nuevo" (click)="abrirDialog()">
      Agregar Feriado
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="15" height="15">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Calendario -->
  <div class="cal-card">
    <div class="cal-header">
      <div *ngFor="let d of diasSemana" class="cal-header-cell">{{ d }}</div>
    </div>
    <div class="cal-grid">
      <div *ngFor="let celda of celdasCalendario"
           class="cal-cell"
           [class.otro-mes]="!celda.esEsteMes"
           [class.hoy]="celda.esHoy">
        <span class="cal-num">{{ celda.dia }}</span>
        <div class="cal-eventos">
          <div *ngFor="let f of celda.feriados"
               class="cal-evento"
               [class.ev-nacional]="f.tipo === 'NACIONAL'"
               [class.ev-religioso]="f.tipo === 'RELIGIOSO'"
               [class.ev-local]="f.tipo === 'LOCAL'">
            {{ f.nombre }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Leyenda -->
  <div class="leyenda">
    <span class="ley-item"><span class="ley-dot nacional"></span> Nacional</span>
    <span class="ley-item"><span class="ley-dot religioso"></span> Religioso</span>
    <span class="ley-item"><span class="ley-dot local"></span> Local</span>
  </div>

</div>
