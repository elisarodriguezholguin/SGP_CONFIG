<div class="config-page">

  <h2 class="page-title">Roles</h2>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#163572" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <div class="stat-info">
        <span class="stat-num">{{ totalRoles }}</span>
        <span class="stat-label">Total Roles</span>
      </div>
    </div>
  </div>

  <!-- Buscador + botón -->
  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" placeholder="Buscar por nombre de rol..." (input)="applyFilter($event)" />
    </div>
    <button class="btn-nuevo" (click)="abrirDialog()">+ Nuevo Rol</button>
  </div>

  <div class="loading-wrap" *ngIf="loading">Cargando...</div>

  <div class="table-card" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" class="config-table">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>ROL</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>DESCRIPCIÓN</th>
        <td mat-cell *matCellDef="let r">{{ r.descripcion }}</td>
      </ng-container>

      <ng-container matColumnDef="modulos">
        <th mat-header-cell *matHeaderCellDef>MÓDULOS</th>
        <td mat-cell *matCellDef="let r">
          <div class="chips-wrap">
            <span *ngFor="let mod of r.modulos.slice(0,3); let i = index"
              class="chip" [ngClass]="chipColor(i)">{{ mod }}</span>
            <span class="chip chip-gray" *ngIf="r.modulos.length > 3">
              +{{ r.modulos.length - 3 }} más
            </span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>ACCIONES</th>
        <td mat-cell *matCellDef="let r">
          <button class="edit-btn" (click)="abrirDialog(r)" title="Editar">
            <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" width="16" height="16">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>
    <mat-paginator style="display:none" [pageSize]="pageSize" [length]="dataSource.data.length"></mat-paginator>
  </div>

  <!-- Paginación -->
  <div class="paginator-row" *ngIf="!loading">
    <span class="paginator-info">Mostrando {{ dataSource.filteredData.length }} registros</span>
    <div class="custom-paginator">
      <span class="page-label">Página {{ currentPage }} de {{ totalPages }}</span>
      <button class="pag-btn" (click)="goFirst()" [disabled]="currentPage === 1">«</button>
      <button class="pag-btn" (click)="goPrev()" [disabled]="currentPage === 1">‹</button>
      <button class="pag-btn" (click)="goNext()" [disabled]="currentPage === totalPages">›</button>
      <button class="pag-btn" (click)="goLast()" [disabled]="currentPage === totalPages">»</button>
    </div>
  </div>

</div>
