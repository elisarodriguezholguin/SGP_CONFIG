<div class="config-page">

  <!-- Header -->
  <h2 class="page-title">Roles</h2>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <mat-icon>shield</mat-icon>
      <span class="stat-num">{{ totalRoles }}</span>
      <span class="stat-label">Total Roles</span>
    </div>
  </div>

  <!-- Buscador + botón -->
  <div class="toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput placeholder="Buscar por nombre de rol..." (input)="applyFilter($event)" />
    </mat-form-field>
    <button mat-flat-button color="primary" class="btn-nuevo" (click)="abrirDialog()">
      <mat-icon>add</mat-icon> Nuevo Rol
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" *ngIf="loading">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <!-- Tabla -->
  <div class="table-card" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" class="config-table">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let r">{{ r.descripcion }}</td>
      </ng-container>

      <ng-container matColumnDef="modulos">
        <th mat-header-cell *matHeaderCellDef>Módulos</th>
        <td mat-cell *matCellDef="let r">{{ r.modulos.join(', ') }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button (click)="abrirDialog(r)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>

    <div class="paginator-row">
      <span class="paginator-info">Mostrando {{ dataSource.filteredData.length }} registros</span>
      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
    </div>
  </div>

</div>
